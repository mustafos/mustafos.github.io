# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject GA4 measurement ID
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const file = 'assets/js/config.js';
            const id = (process.env.GA_MEASUREMENT_ID || '').trim();
            if (!id) {
              console.log('::warning title=GA4 disabled::GA_MEASUREMENT_ID secret is not set. Analytics will be disabled in this deploy.');
              process.exit(0);
            }
            if (!/^G-[A-Z0-9]+$/i.test(id)) {
              console.error('::error::GA_MEASUREMENT_ID must be a GA4 web stream ID like G-XXXXXXXXXX. Received: ' + id);
              process.exit(1);
            }
            const content = fs.readFileSync(file, 'utf8');
            if (!/gaMeasurementId:\s*''/.test(content)) {
              console.error('::error::Expected empty gaMeasurementId placeholder in assets/js/config.js');
              process.exit(1);
            }
            const updated = content.replace(/gaMeasurementId:\s*''/, \"gaMeasurementId: '\" + id + \"'\");
            fs.writeFileSync(file, updated);
            if (!updated.includes(\"gaMeasurementId: '\" + id + \"'\")) {
              console.error('::error::Failed to write GA measurement ID into assets/js/config.js');
              process.exit(1);
            }
            console.log('GA4 measurement ID injected for deploy.');
          "
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
