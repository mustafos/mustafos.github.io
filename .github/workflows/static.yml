# Sole production GitHub Pages workflow for this static site.
# If branch-based Jekyll Pages deploy is still enabled, this workflow redeploys
# after Jekyll finishes so the injected GA config is not overwritten.
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  detect-jekyll-overwrite:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    outputs:
      needs_redeploy: ${{ steps.check.outputs.needs_redeploy }}
    steps:
      - name: Detect Jekyll branch build
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const needsRedeploy = data.jobs.some((job) =>
              job.steps?.some((step) => step.name === 'Build with Jekyll')
            );

            core.setOutput('needs_redeploy', needsRedeploy ? 'true' : 'false');

  deploy:
    needs: [detect-jekyll-overwrite]
    if: >
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          needs.detect-jekyll-overwrite.result == 'success' &&
          needs.detect-jekyll-overwrite.outputs.needs_redeploy == 'true'
        )
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Inject GA4 measurement ID
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID || secrets.GA_MEASUREMENT_ID }}
        run: node scripts/inject-site-config.mjs

      - name: Verify GA measurement ID in site config
        run: |
          if ! grep -Eq "gaMeasurementId: 'G-[A-Z0-9]+'" assets/js/config.js; then
            echo "::error::assets/js/config.js does not contain a valid injected GA measurement ID."
            cat assets/js/config.js
            exit 1
          fi
          echo "Verified GA measurement ID present in config.js."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
